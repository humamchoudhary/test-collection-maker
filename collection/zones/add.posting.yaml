name: Zones Add
method: POST
url: $LOCAL_BASE_URL/zones/assign
body:
  content: |-
    {
        "name": "",
        "radius": "",
        "center_lat": "",
        "center_long": "",
        "address": "",
        "depo": "",
        "dump": "",
        "distance": "",
        "coordinates": ""
    }
  content_type: application/json
auth:
  type: bearer_token
  bearer_token:
    token: $TOKEN
headers:
- name: content-type
  value: application/json
