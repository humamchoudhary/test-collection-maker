name: Zones Update
method: PUT
url: $LOCAL_BASE_URL/zones/update/:zone_id
body:
  content: |-
    {
        "name": "",
        "address": "",
        "depo": "",
        "dump": "",
        "distance": "",
        "coordinates": ""
    }
  content_type: application/json
auth:
  type: bearer_token
  bearer_token:
    token: $TOKEN
headers:
- name: content-type
  value: application/json
