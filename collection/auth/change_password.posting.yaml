name: Auth Change_password
method: POST
url: $LOCAL_BASE_URL/auth/change_password/
body:
  content: |-
    {
        "email": "",
        "token": "",
        "password": ""
    }
  content_type: application/json
auth:
  type: bearer_token
  bearer_token:
    token: $TOKEN
headers:
- name: content-type
  value: application/json
