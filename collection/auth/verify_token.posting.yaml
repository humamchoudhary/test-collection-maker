name: Auth Verify_token
method: POST
url: $LOCAL_BASE_URL/auth/verify_token
body:
  content: |-
    {
        "email": "",
        "verify_token": ""
    }
  content_type: application/json
auth:
  type: bearer_token
  bearer_token:
    token: $TOKEN
headers:
- name: content-type
  value: application/json
