name: Auth Sign_in
method: POST
url: $LOCAL_BASE_URL/auth/sign_in
body:
  content: |-
    {
        "email": "",
        "password": "",
        "remember_me": ""
    }
  content_type: application/json
auth:
  type: bearer_token
  bearer_token:
    token: $TOKEN
headers:
- name: content-type
  value: application/json
