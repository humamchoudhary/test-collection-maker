name: Vehicles Add
method: POST
url: $LOCAL_BASE_URL/vehicles/
body:
  content: |-
    {
        "name": "",
        "waste_type_id": "",
        "max_load": "",
        "max_distance": "",
        "length": "",
        "width": "",
        "height": "",
        "weight_when_full": ""
    }
  content_type: application/json
auth:
  type: bearer_token
  bearer_token:
    token: $TOKEN
headers:
- name: content-type
  value: application/json
