name: Locations Location_update_controller
method: PUT
url: $LOCAL_BASE_URL/locations/details/update/:id
body:
  content: |-
    {
        "name": "",
        "address": "",
        "latitude": "",
        "longitude": ""
    }
  content_type: application/json
auth:
  type: bearer_token
  bearer_token:
    token: $TOKEN
headers:
- name: content-type
  value: application/json
